name: CI

on:
  push:
    branches:
      - main
  pull_request:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  test:
    if: github.event_name != 'pull_request_target'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run ci

  risk-score:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    env:
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      OPENAI_BASE_URL: ${{ vars.OPENAI_BASE_URL || 'https://openrouter.ai/api/v1' }}
    steps:
      - uses: actions/checkout@v6
      - uses: ./
        with:
          github-token: ${{ github.token }}
          comment-mode: off
          fail-threshold: "0"
          mode: ${{ secrets.OPENROUTER_API_KEY != '' && 'hybrid' || 'heuristic' }}

  risk-score-comment:
    if: github.event_name == 'pull_request_target'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    env:
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      OPENAI_BASE_URL: ${{ vars.OPENAI_BASE_URL || 'https://openrouter.ai/api/v1' }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: refs/pull/${{ github.event.pull_request.number }}/merge
      - uses: hiattco/pr-diff-risk-score@main
        with:
          github-token: ${{ github.token }}
          comment-mode: update
          fail-threshold: "0"
          mode: ${{ secrets.OPENROUTER_API_KEY != '' && 'hybrid' || 'heuristic' }}
